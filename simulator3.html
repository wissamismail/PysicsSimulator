<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator3</title>
    <script src="Common/jquery-3.5.1.min.js"></script>
    <script src="Common/Chart.min.js"></script>
    <link rel="stylesheet" type="text/css" href="Simulator3/styles3.css">
</head>

<body direction: rtl;>
    <div id="main-container">
        <h2>الطاقة الكهربائية المخزنة في المكثف</h2>

        <div id="myform">

            <div id="my-labels">
                <label for="C" class="labelFields">السعة C(F)</label>
                <label for="U" class="labelFields">&nbsp  فارق الجهد U(V)</label>
                <label for="Q" class="labelFields">الشحنة Q(C)</label>
            </div>

            <div id="my-inputs">
                <input class="number_input" type="number" id="C" name="C" min="0" value="0.000001" step="1E-6" placeholder="input">
                <input class="number_input" type="number" id="U" name="U" min="0" value="30" placeholder="calculated" onchange="calculateQEP()">
                <input class="number_input" type="number" id="Q" name="Q" min="0" value="0.00001" step="1E-5" placeholder="calculated" onchange="calculateUEP()"><br>
            </div>
            <div id="my-labels">
                <label for="t" class="labelFields">المدة t(s)</label>
                <label for="E" class="labelFields">&nbsp الطاقة المخزنة E(J)</label>
                <label for="P" class="labelFields">معدل القدرة P(W)</label>
            </div>

            <div id="my-inputs">
                <input class="number_input" type="number" id="t" name="t" min="1" value="1" placeholder="input" onchange="calculateP()">
                <input class="number_input" type="number" id="E" name="E" min="0" value="" placeholder="calculated" disabled>
                <input class="number_input" type="number" id="P" name="P" min="0" value="" placeholder="calculated" disabled><br><br>
            </div>
            <div id="my-buttons">
                <button id="btn-append" class="button"><span>إضافة سطر</span></button>&nbsp;
                <button id="btn-clear" class="button">تصفير</button>&nbsp;
                <button id="btn-chart" class="button">تحديث الرسم البياني</button>&nbsp;
            </div>

            <table id="data-table"></table>
            <div id="myChart">
                <canvas id="canvasChart"></canvas>
                <br>
            </div>
        </div>

    </div>
</body>
<script src="Simulator3/myChartUtils3.js"></script>
<script type="text/javascript" src="Simulator3/common3.js"></script>

</html>
