<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاكاة رقم 5</title>
    <script src="Common/jquery-3.5.1.min.js"></script>
    <script src="Common/Chart.min.js"></script>
    <link rel="stylesheet" type="text/css" href="simulator5/styles5.css">
</head>

<body direction: rtl;>
    <div id="main-container">
        <div id="myHeader">
            <label id="labelHeader"><br><br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;أثناء تفريغ المكثف</label>
        </div>
        <div class="flex-container">
            <div id="myform" class="flex-child">
                <div id="my-labels">
                    <div class="inline-block">
                        <label for="R4" class="block">المقاوم R(Ω):</label>
                        <input class="number_input" style="margin-right: 75px;" type="number" id="R4" name="R4" min="0" max="100" value="1" onchange="calculateResult()">
                    </div>
                    <div class="inline-block">
                        <label for="C4" class="block">سعة المكثف C(F):</label>
                        <input class="number_input" style="margin-right: 48px;" type="number" id="C4" name="C4" min="0" max="10" value="0.000001" step="1E-6" onchange="calculateResult()">
                    </div>
                    <div class="inline-block">
                        <label for="E4" class="block">فارق الجهد الاقصى E(V):</label>
                        <input class="number_input" style="margin-right: 0px;" type="number" id="E4" name="E4" min="0" step="0.5" value="05" onchange="calculateResult()">
                    </div>
                    <div class="inline-block">
                        <label for="T4" class="block">لحظة القياس t(s):</label>
                        <input class="number_input" style="margin-right: 55px;" type="number" id="T4" name="T4" min="0" max="10" step="5E-3" value="0.005" onchange="calculateResult()">
                    </div>
                </div>
                <hr>
                <div id="my-results">
                    <div class="inline-block">
                        <label for="myCheck">مخرجات ثابت الزمن Ƭ(s) =</label>
                        <input class="number_input" type="number" style="margin-right: 152px;" id="ct4" value="0" disabled><br>
                    </div>
                    <div class="inline-block">
                        <label for="myCheck">فولتية المكثف المتغيرة بحسب الزمن u(t) =</label>
                        <input class="number_input" type="number" style="margin-right: 35px;" id="u4" value="0" disabled><br>
                    </div>
                    <div class="inline-block">
                        <label for="myCheck">قيمة التيار المتدفق في الدارة بحسب الزمن i(t) =</label>
                        <input class="number_input" type="number" style="margin-right: 0px;" id="i4" value="0" disabled><br>
                    </div>
                </div>
                <hr>
                <div>
                    <div id="my-buttons">
                        <button id="btn-append" class="button"><span>إضافة سطر</span></button>&nbsp;
                        <button id="btn-clear" class="button">تصفير</button>&nbsp;
                        <button id="btn-chart" class="button">تحديث الرسم البياني</button>&nbsp;
                    </div>
                    <table id="data-table"></table>
                </div>
            </div>

            <div id="myimage" class="flex-child">
                <img src="Simulator5/simulator5.png" style="display: block; margin-left: auto;margin-right: auto;">
                <br>
                <ul id="Tos" hidden> </ul>
            </div>

            <div id="myChart1" class="flex-child">
                <canvas id="canvasChart1"></canvas>
                <br>
            </div>
            <div id="myChart2" class="flex-child">
                <canvas id="canvasChart2"></canvas>
                <br>
            </div>
        </div>

    </div>
</body>
<script src="Simulator5/myChartUtils5.js"></script>
<script type="text/javascript" src="Simulator5/common5.js"></script>

</html>
