<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاكاة رقم 7</title>
    <script src="Common/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" type="text/css" href="Simulator7/styles7.css">
</head>

<body>
    <div id="main-container">

        <div id="myHeader">
            <label id="labelHeader"><br><br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;المكثفات المتصلة على التوازي</label>
        </div>
        <div class="flex-container">
            <div id="myform" class="flex-child">
                <div id="my-labels">
                    <label for="C" style="margin-right: 10px;">السعة C(F)</label>
                    <label for="U" style="margin-right: 20px;">فارق الجهد U(V)</label>
                    <label for="Q" style="margin-right: 10px;">الشحنة Q(C)</label>
                </div>

                <div id="my-inputs">
                    <input class="number_input" type="number" id="C" name="C" min="0" value="0.0000001" value="0.0000001" step="1E-6" onchange="calculateResult()">
                    <input class="number_input" type="number" id="U" name="U" min="0" value="30" onchange="calculateResult()">
                    <input class="number_input" type="number" id="Q" name="Q" min="0" value="0.000003" step="0.00001" onchange="calculateResult()" readonly>
                </div>
                <div id="my-radios">
                    <label for="male" class="label-calculate">إحتساب</label>
                    <input type="radio" class="radio_input" style="margin-right: 20px;" id="radio-C" onclick="handleClick(this);" name="radio3" value="C">
                    <input type="radio" class="radio_input" style="margin-right: 50px;" id="radio-U" onclick="handleClick(this);" name="radio3" value="U">
                    <input type="radio" class="radio_input" style="margin-right: 50px;" id="radio-Q" onclick="handleClick(this);" name="radio3" value="Q" checked>
                </div>
                <hr>
                <div id="my-buttons">
                    <button id="btn-append" class="button"><span>إضافة مكثف جديد</span></button>&nbsp;
                    <button id="btn-clear" class="button">تصفير</button>&nbsp;
                    <button id="btn-chart" class="button">إحتساب النتيجة</button>&nbsp;
                </div>

                <table id="data-table"></table>

                <div id="myimage">
                    <img src="Simulator7/simulator7.png" width="400">
                </div>
            </div>
        </div>
    </div>
</body>

<script type="text/javascript" src="Simulator7/common7.js"></script>

</html>
